<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Score</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F4F0; --text: #1A1A1A; --text-muted: #7A7A7A; --accent: #3B6BCC;
    --card: #FFFFFF; --border: #E8E5E0;
    --score-excellent: #2D8F5E; --score-good: #5BA35B; --score-fair: #C9A832;
    --score-poor: #C27A3A; --score-bad: #A14B4B;
    --radius: 16px; --shadow: 0 2px 20px rgba(0,0,0,0.04);
    --btn-bg: #1A1A1A; --btn-text: #F6F4F0; --metric-bg: #F0EDE8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; transition:background 1s ease,color .5s ease; }
  .container { max-width:640px; margin:0 auto; padding:60px 24px 80px; }
  header { text-align:center; margin-bottom:48px; animation:fadeUp .6s ease both; }
  header h1 { font-family:'DM Serif Display',serif; font-size:3rem; letter-spacing:-1px; margin-bottom:8px; color:var(--text); transition:color .5s ease; }
  header h1 a { text-decoration:none; color:inherit; }
  header p { color:var(--text-muted); font-weight:300; font-size:1.05rem; letter-spacing:.3px; }
  .lang-bar { display:flex; justify-content:center; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
  .lang-btn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:5px 12px; font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:500; color:var(--text-muted); cursor:pointer; transition:all .2s; letter-spacing:.5px; }
  .lang-btn:hover { border-color:var(--accent); color:var(--accent); }
  .lang-btn.active { background:var(--btn-bg); color:var(--btn-text); border-color:var(--btn-bg); }
  .search-area { display:flex; gap:10px; margin-bottom:12px; animation:fadeUp .6s ease .1s both; position:relative; z-index:50; }
  .search-wrapper { flex:1; position:relative; z-index:51; }
  .autocomplete-dropdown { position:absolute; top:100%; left:0; right:0; background:var(--card); border:1.5px solid var(--border); border-top:none; border-radius:0 0 12px 12px; max-height:240px; overflow-y:auto; z-index:200; display:none; box-shadow:0 12px 32px rgba(0,0,0,0.12); backdrop-filter:blur(8px); }
  .autocomplete-dropdown.open { display:block; }
  .auto-item { padding:12px 20px; cursor:pointer; font-size:.9rem; color:var(--text); transition:background .15s; display:flex; flex-direction:column; gap:1px; border-bottom:1px solid var(--border); }
  .auto-item:last-child { border-bottom:none; }
  .auto-item:hover,.auto-item.active { background:var(--metric-bg); }
  .auto-item-name { font-weight:500; }
  .auto-item-region { font-size:.75rem; color:var(--text-muted); }
  .search-input,.datetime-input { flex:1; width:100%; padding:14px 20px; border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:.95rem; background:var(--card); color:var(--text); outline:none; transition:border .2s,background .8s ease,color .5s ease; }
  .search-input:focus,.datetime-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:#B5B5B5; }
  .datetime-row { display:flex; gap:10px; margin-bottom:16px; animation:fadeUp .6s ease .12s both; align-items:center; }
  .datetime-input { flex:1; min-width:0; }
  .datetime-label { font-size:.78rem; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); white-space:nowrap; flex-shrink:0; }
  .btn-now { padding:10px 14px; background:var(--card); color:var(--text-muted); border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500; cursor:pointer; transition:all .2s,background .8s ease; white-space:nowrap; text-transform:uppercase; letter-spacing:.8px; }
  .btn-now:hover { border-color:var(--accent); color:var(--accent); }
  .btn { padding:14px 22px; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:500; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .btn-primary { background:var(--btn-bg); color:var(--btn-text); transition:all .2s,background .8s ease; }
  .btn-primary:hover { opacity:.85; transform:translateY(-1px); }
  .btn-gps { background:var(--card); color:var(--text); border:1.5px solid var(--border); display:flex; align-items:center; gap:6px; animation:fadeUp .6s ease .15s both; transition:background .8s ease,color .5s ease,border-color .5s ease; margin-bottom:24px; }
  .btn-gps:hover { border-color:var(--accent); color:var(--accent); }
  .btn-gps svg { width:16px; height:16px; }

  /* Recents */
  .recents-section { margin-bottom:20px; animation:fadeUp .6s ease .18s both; }
  .recents-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:10px; }
  .recents-bar { display:flex; gap:8px; flex-wrap:wrap; }
  .recent-chip { display:flex; align-items:center; gap:4px; padding:7px 14px; background:var(--card); border:1.5px solid var(--border); border-radius:20px; font-size:.8rem; cursor:pointer; transition:all .2s; color:var(--text); font-family:'DM Sans',sans-serif; }
  .recent-chip:hover { border-color:var(--accent); color:var(--accent); }
  .recent-chip .recent-remove { font-size:.65rem; opacity:.35; margin-left:4px; cursor:pointer; }
  .recent-chip .recent-remove:hover { opacity:1; color:var(--score-bad); }

  .time-badge { display:inline-block; padding:4px 10px; border-radius:6px; font-size:.72rem; font-weight:500; text-transform:uppercase; letter-spacing:1px; margin-left:8px; vertical-align:middle; font-family:'DM Sans',sans-serif; }
  .time-badge.past { background:#EDE7F6; color:#5E35B1; }
  .time-badge.now { background:#E8F5E9; color:#2E7D32; }
  .time-badge.future { background:#E3F2FD; color:#1565C0; }
  .status { text-align:center; padding:24px; color:var(--text-muted); font-size:.9rem; font-weight:300; animation:fadeUp .4s ease both; }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin-right:8px; vertical-align:middle; }
  .result-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:40px 32px; animation:fadeUp .5s ease both; border:1px solid var(--border); transition:background .8s ease,border-color .5s ease; }
  .location-name { font-family:'DM Serif Display',serif; font-size:1.6rem; margin-bottom:4px; letter-spacing:-.5px; }
  .location-meta { color:var(--text-muted); font-size:.85rem; font-weight:300; margin-bottom:32px; line-height:1.6; }
  .score-section { display:flex; align-items:center; gap:32px; margin-bottom:36px; padding-bottom:36px; border-bottom:1px solid var(--border); }
  .score-ring { position:relative; width:110px; height:110px; flex-shrink:0; }
  .score-ring svg { width:110px; height:110px; transform:rotate(-90deg); }
  .score-ring .bg-ring { fill:none; stroke:var(--border); stroke-width:6; }
  .score-ring .fg-ring { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s ease,stroke .5s ease; }
  .score-number { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'DM Serif Display',serif; font-size:2rem; letter-spacing:-1px; }
  .score-info h3 { font-family:'DM Serif Display',serif; font-size:1.3rem; margin-bottom:6px; }
  .score-info p { color:var(--text-muted); font-size:.88rem; font-weight:300; line-height:1.6; }
  .metrics { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .metric { padding:16px; background:var(--metric-bg); border-radius:12px; transition:background .8s ease; }
  .metric-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:6px; }
  .metric-value { font-size:1.25rem; font-weight:500; letter-spacing:-.3px; }
  .metric-bar { height:3px; background:var(--border); border-radius:2px; margin-top:8px; overflow:hidden; }
  .metric-bar-fill { height:100%; border-radius:2px; transition:width .8s ease; }

  /* Sun info */
  .sun-info { display:flex; gap:16px; margin-top:20px; padding:16px; background:var(--metric-bg); border-radius:12px; transition:background .8s ease; }
  .sun-item { flex:1; text-align:center; }
  .sun-icon { font-size:1.2rem; margin-bottom:4px; }
  .sun-label { font-size:.68rem; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); margin-bottom:2px; }
  .sun-time { font-size:.95rem; font-weight:500; }
  .golden-badge { display:inline-block; margin-top:12px; padding:6px 14px; border-radius:20px; font-size:.75rem; font-weight:500; background:linear-gradient(135deg,#F6D365,#FDA085); color:#5D3A1A; letter-spacing:.5px; }

  /* Share bar */
  .share-bar { display:flex; gap:8px; margin-top:20px; justify-content:center; flex-wrap:wrap; }
  .share-btn { padding:8px 16px; border-radius:20px; border:1.5px solid var(--border); background:var(--card); color:var(--text); font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:5px; }
  .share-btn:hover { border-color:var(--accent); color:var(--accent); }
  .share-btn svg { width:14px; height:14px; }

  /* 7-day strip */
  .forecast-strip { margin-top:24px; }
  .forecast-strip-title { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:12px; }
  .strip-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
  .strip-day { flex:0 0 auto; width:72px; padding:12px 8px; background:var(--metric-bg); border-radius:10px; text-align:center; cursor:pointer; transition:all .2s; border:1.5px solid transparent; }
  .strip-day:hover { border-color:var(--accent); }
  .strip-day.active { border-color:var(--accent); background:var(--card); }
  .strip-day-name { font-size:.68rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:4px; }
  .strip-day-score { font-size:1.1rem; font-weight:600; }
  .strip-day-label { font-size:.6rem; color:var(--text-muted); margin-top:2px; }

  /* Best hour */
  .best-hour { margin-top:16px; padding:16px; background:var(--metric-bg); border-radius:12px; text-align:center; transition:background .8s ease; }
  .best-hour-title { font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:6px; }
  .best-hour-value { font-size:1.3rem; font-weight:600; }
  .best-hour-score { font-size:.85rem; color:var(--text-muted); margin-top:2px; }

  /* Methodology */
  .methodology { margin-top:40px; animation:fadeUp .5s ease .15s both; }
  .methodology-toggle { display:flex; align-items:center; gap:8px; background:none; border:none; font-family:'DM Sans',sans-serif; font-size:.82rem; color:var(--text-muted); cursor:pointer; letter-spacing:.5px; text-transform:uppercase; padding:0; }
  .methodology-toggle:hover { color:var(--text); }
  .methodology-toggle svg { width:14px; height:14px; transition:transform .3s; }
  .methodology-content { display:none; margin-top:16px; padding:24px; background:var(--card); border-radius:var(--radius); border:1px solid var(--border); font-size:.85rem; color:var(--text-muted); line-height:1.8; font-weight:300; }
  .methodology-content.open { display:block; animation:fadeUp .3s ease; }
  .methodology-toggle.open svg { transform:rotate(180deg); }
  .methodology-content strong { color:var(--text); font-weight:500; }
  .methodology-content .formula { margin:12px 0; padding:12px 16px; background:var(--metric-bg); border-radius:8px; font-family:monospace; font-size:.8rem; color:var(--text); }
  .error { text-align:center; padding:24px; color:var(--score-bad); font-size:.9rem; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }

  @media(max-width:500px){
    .container{padding:40px 16px 60px} header h1{font-size:2.2rem}
    .search-area{flex-direction:column} .search-input,.datetime-input{font-size:16px}
    .datetime-row{flex-wrap:wrap} .datetime-label{width:100%;margin-bottom:-4px}
    .datetime-input{min-height:48px} .btn{min-height:48px} .btn-now{min-height:44px}
    .btn-gps{min-height:48px;justify-content:center;width:100%}
    .score-section{flex-direction:column;text-align:center;gap:20px}
    .metrics{grid-template-columns:1fr} .result-card{padding:28px 20px}
    .location-name{font-size:1.35rem;line-height:1.4}
    .time-badge{display:block;margin-left:0;margin-top:6px;width:fit-content}
    .methodology-content{padding:18px 16px}
    .sun-info{flex-wrap:wrap}
  }
  @media(max-width:360px){ header h1{font-size:1.9rem} .score-ring{width:90px;height:90px} .score-ring svg{width:90px;height:90px} .score-number{font-size:1.6rem} }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ko">한국어</button>
      <button class="lang-btn" data-lang="ja">日本語</button>
      <button class="lang-btn" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
    <h1><a href="#" id="homeLink">Sky Score</a></h1>
    <p id="subtitle">How photogenic is the sky? Past, present, or future.</p>
  </header>

  <div class="search-area">
    <div class="search-wrapper">
      <input type="text" class="search-input" id="cityInput" placeholder="Enter a city or zip code…" autocomplete="off" />
      <div class="autocomplete-dropdown" id="autoDropdown"></div>
    </div>
    <button class="btn btn-primary" id="searchBtn">Score</button>
  </div>

  <div class="datetime-row">
    <span class="datetime-label" id="whenLabel">When</span>
    <input type="date" class="datetime-input" id="dateInput" />
    <input type="time" class="datetime-input" id="timeInput" />
    <button class="btn-now" id="nowBtn">Now</button>
  </div>

  <button class="btn btn-gps" id="gpsBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
    <span id="gpsLabel">Use my location</span>
  </button>

  <div class="recents-section" id="recentsSection"></div>

  <div id="output"></div>
</div>

<script>
const GEOCODE_URL='https://geocoding-api.open-meteo.com/v1/search';
const FORECAST_URL='https://api.open-meteo.com/v1/forecast';
const ARCHIVE_URL='https://archive-api.open-meteo.com/v1/archive';
const $=id=>document.getElementById(id);
let lang='en', lastResult=null;

/* ========== i18n ========== */
const i18n={

function t(k){return i18n[lang][k]||i18n.en[k]||k}
function setLang(l){lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));$('subtitle').textContent=t('subtitle');$('cityInput').placeholder=t('placeholder');$('searchBtn').textContent=t('score');$('whenLabel').textContent=t('when');$('nowBtn').textContent=t('now');$('gpsLabel').textContent=t('useLocation');renderRecents();}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

/* ========== Utilities ========== */
function pad(n){return String(n).padStart(2,'0')}
function localDateStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function setNow(){const n=new Date();$('dateInput').value=localDateStr(n);$('timeInput').value=pad(n.getHours())+':'+pad(n.getMinutes());}
setNow();

$('nowBtn').addEventListener('click',setNow);
$('homeLink').addEventListener('click',e=>{e.preventDefault();$('cityInput').value='';$('output').innerHTML='';setNow();resetBackground();$('cityInput').focus();});
$('cityInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){closeAuto();$('searchBtn').click();}
  else if(e.key==='ArrowDown'){e.preventDefault();moveAutoFocus(1);}
  else if(e.key==='ArrowUp'){e.preventDefault();moveAutoFocus(-1);}
  else if(e.key==='Escape'){closeAuto();}
});

/* ========== Autocomplete ========== */
let autoTimer=null, autoFocusIdx=-1;
const autoDrop=$('autoDropdown');

$('cityInput').addEventListener('input',()=>{
  clearTimeout(autoTimer);
  const val=$('cityInput').value.trim();
  if(val.length<2){closeAuto();return;}
  autoTimer=setTimeout(()=>fetchSuggestions(val),250);
});

$('cityInput').addEventListener('blur',()=>{setTimeout(closeAuto,200);});

async function fetchSuggestions(q){
  try{
    const res=await fetch(`${GEOCODE_URL}?name=${encodeURIComponent(q)}&count=6&language=en`);
    const data=await res.json();
    if(!data.results||!data.results.length){closeAuto();return;}
    autoFocusIdx=-1;
    autoDrop.innerHTML=data.results.map((r,i)=>{
      const name=r.name;
      const region=[r.admin1,r.country].filter(Boolean).join(', ');
      return `<div class="auto-item" data-idx="${i}" data-lat="${r.latitude}" data-lon="${r.longitude}" data-name="${name}${region?', '+region:''}"><span class="auto-item-name">${name}</span><span class="auto-item-region">${region}</span></div>`;
    }).join('');
    autoDrop.classList.add('open');
    autoDrop.querySelectorAll('.auto-item').forEach(item=>{
      item.addEventListener('mousedown',e=>{
        e.preventDefault();
        const fullName=item.dataset.name;
        $('cityInput').value=fullName;
        closeAuto();
        fetchWeather(+item.dataset.lat,+item.dataset.lon,fullName);
      });
    });
  }catch(e){closeAuto();}
}

function closeAuto(){autoDrop.classList.remove('open');autoDrop.innerHTML='';autoFocusIdx=-1;}

function moveAutoFocus(dir){
  const items=autoDrop.querySelectorAll('.auto-item');
  if(!items.length)return;
  autoFocusIdx+=dir;
  if(autoFocusIdx<0)autoFocusIdx=items.length-1;
  if(autoFocusIdx>=items.length)autoFocusIdx=0;
  items.forEach((it,i)=>it.classList.toggle('active',i===autoFocusIdx));
  if(autoFocusIdx>=0){
    const sel=items[autoFocusIdx];
    $('cityInput').value=sel.dataset.name;
  }
}

/* ========== Recents ========== */
function getRecents(){try{return JSON.parse(localStorage.getItem('skyRecents')||'[]')}catch{return[]}}
function saveRecents(r){localStorage.setItem('skyRecents',JSON.stringify(r))}
function addRecent(name,lat,lon){let r=getRecents();r=r.filter(x=>x.name!==name);r.unshift({name,lat,lon});if(r.length>8)r=r.slice(0,8);saveRecents(r);renderRecents();}
function removeRecent(name){saveRecents(getRecents().filter(x=>x.name!==name));renderRecents();}
function renderRecents(){const r=getRecents(),sec=$('recentsSection');if(!r.length){sec.innerHTML='';return;}
sec.innerHTML=`<div class="recents-label">${t('recents')}</div><div class="recents-bar">${r.map(x=>`<div class="recent-chip" data-lat="${x.lat}" data-lon="${x.lon}" data-name="${x.name}"><span>${x.name.split(',')[0]}</span><span class="recent-remove" data-name="${x.name}">×</span></div>`).join('')}</div>`;
sec.querySelectorAll('.recent-chip').forEach(c=>{c.addEventListener('click',e=>{if(e.target.classList.contains('recent-remove')){removeRecent(e.target.dataset.name);return;}fetchWeather(+c.dataset.lat,+c.dataset.lon,c.dataset.name);});});}
renderRecents();

/* ========== Sound ========== */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
function playTone(score){
  try{const ctx=new AudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='sine';
  if(score>=85){o.frequency.value=880;g.gain.value=0.08;} // high bright
  else if(score>=70){o.frequency.value=660;g.gain.value=0.07;}
  else if(score>=50){o.frequency.value=440;g.gain.value=0.06;}
  else if(score>=30){o.frequency.value=330;g.gain.value=0.05;}
  else{o.frequency.value=220;g.gain.value=0.04;} // low rumble
  o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.2);
  o.stop(ctx.currentTime+1.3);
  setTimeout(()=>ctx.close(),1500);
  }catch(e){}
}

/* ========== Search ========== */
$('searchBtn').addEventListener('click',async()=>{
  const input=$('cityInput').value.trim();if(!input)return;
  showStatus(t('lookingUp'));
  try{
    if(/^\d{4,10}(-\d{1,4})?$/.test(input)){
      const r=await fetch(`https://api.zippopotam.us/us/${input.split('-')[0]}`);
      if(!r.ok)return await searchByName(input);
      const d=await r.json(),p=d.places[0];
      return await fetchWeather(+p.latitude,+p.longitude,`${p['place name']}, ${p['state abbreviation']} ${input}`);
    }
    await searchByName(input);
  }catch(e){showError(t('lookupError'))}
});

async function searchByName(city){
  const g=await fetch(`${GEOCODE_URL}?name=${encodeURIComponent(city)}&count=1&language=en`).then(r=>r.json());
  if(!g.results?.length)return showError(t('notFound'));
  const l=g.results[0],name=`${l.name}${l.admin1?', '+l.admin1:''}${l.country?', '+l.country:''}`;
  await fetchWeather(l.latitude,l.longitude,name);
}

$('gpsBtn').addEventListener('click',()=>{
  if(!navigator.geolocation)return showError(t('geoNotSupported'));
  showStatus(t('gettingLocation'));
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    let name=`${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=14&addressdetails=1`);const g=await r.json();if(g?.address){const a=g.address;const c=a.city||a.town||a.village||a.hamlet||a.suburb||a.municipality||'';const s=a.state||a.county||'';const co=a.country||'';const p=[c,s,co].filter(Boolean);if(p.length)name=p.join(', ');}}catch(e){}
    await fetchWeather(lat,lon,name);
  },()=>showError(t('geoDenied')));
});

function getSelectedDateTime(){const d=$('dateInput').value,ti=$('timeInput').value||'12:00';if(!d){setNow();return getSelectedDateTime();}const[y,m,da]=d.split('-').map(Number),[h,mi]=ti.split(':').map(Number);return new Date(y,m-1,da,h,mi);}
function getTimeMode(target){const dh=(target-new Date())/36e5;if(Math.abs(dh)<1)return'now';return dh<0?'past':'future';}

async function fetchWeather(lat,lon,name){
  showStatus(t('fetchingSky'));
  const target=getSelectedDateTime(),mode=getTimeMode(target),dateStr=localDateStr(target);
  const hVars='cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,weather_code,is_day';
  try{
    let data;
    if(mode==='now'){
      const p=`latitude=${lat}&longitude=${lon}&current=cloud_cover,weather_code,visibility,is_day&hourly=${hVars}&daily=sunrise,sunset&forecast_days=7&timezone=auto`;
      data=await fetch(`${FORECAST_URL}?${p}`).then(r=>r.json());
      if(data.error)return showError(data.reason||t('apiError'));
      return renderResult(data,name,lat,lon,target,mode,true);
    }
    if(mode==='future'){
      const endDate=new Date(target);endDate.setDate(endDate.getDate()+6);
      const maxDate=new Date();maxDate.setDate(maxDate.getDate()+16);
      if(endDate>maxDate)endDate.setTime(maxDate.getTime());
      const p=`latitude=${lat}&longitude=${lon}&hourly=${hVars}&daily=sunrise,sunset&start_date=${dateStr}&end_date=${localDateStr(endDate)}&timezone=auto`;
      data=await fetch(`${FORECAST_URL}?${p}`).then(r=>r.json());
      if(data.error)return showError(data.reason||t('forecastLimit'));
      return renderResult(data,name,lat,lon,target,mode,false);
    }
    const dd=Math.floor((new Date()-target)/864e5),url=dd<=92?FORECAST_URL:ARCHIVE_URL;
    const p=`latitude=${lat}&longitude=${lon}&hourly=${hVars}&daily=sunrise,sunset&start_date=${dateStr}&end_date=${dateStr}&timezone=auto`;
    data=await fetch(`${url}?${p}`).then(r=>r.json());
    if(data.error)return showError(data.reason||t('historyError'));
    renderResult(data,name,lat,lon,target,mode,false);
  }catch(e){console.error(e);showError(t('fetchError'));}
}

/* ========== Scoring ========== */
function computeFromCurrent(d){const c=d.current,h=d.hourly;return calcScore(c.cloud_cover,c.visibility/1000,c.weather_code,c.is_day,avg(h.cloud_cover_high||[0]),avg(h.cloud_cover_mid||[0]),avg(h.cloud_cover_low||[0]));}

function computeFromHourly(h,idx){
  const s=i=>Math.max(0,Math.min(i,h.cloud_cover.length-1));
  const w0=s(idx-2),w1=s(idx+3);
  const sl=a=>{if(!a)return[0];const x=a.slice(w0,w1+1);return x.length?x:[0]};
  return calcScore(h.cloud_cover[s(idx)],(h.visibility?h.visibility[s(idx)]:24000)/1000,h.weather_code[s(idx)],h.is_day?h.is_day[s(idx)]:1,avg(sl(h.cloud_cover_high)),avg(sl(h.cloud_cover_mid)),avg(sl(h.cloud_cover_low)));
}

function calcScore(cc,vis,wc,isDay,aH,aM,aL){
  let cs;if(cc<=10)cs=95;else if(cc<=30)cs=100;else if(cc<=50)cs=80;else if(cc<=70)cs=50;else if(cc<=85)cs=25;else cs=10;
  const hb=Math.min(aH*1.2,100),mb=Math.min(aM*.8,80),lp=aL*.6;
  let pc=Math.max(0,Math.min(100,(hb*.5+mb*.5)-lp));if(cc<5)pc=Math.min(pc,20);
  let vs;if(vis>=20)vs=100;else if(vis>=10)vs=85;else if(vis>=5)vs=60;else if(vis>=2)vs=30;else vs=10;
  let co=100;if([0,1].includes(wc))co=100;else if(wc===2)co=85;else if(wc===3)co=55;else if([45,48].includes(wc))co=20;else if([51,53,55,56,57,61,63,65,66,67].includes(wc))co=25;else if([71,73,75,77].includes(wc))co=35;else if([80,81,82].includes(wc))co=20;else if([85,86].includes(wc))co=30;else if([95,96,99].includes(wc))co=15;
  const total=Math.round(cs*.4+pc*.25+vs*.2+co*.15);
  return{total:Math.max(0,Math.min(100,total)),clearSky:Math.round(cs),prettyClouds:Math.round(pc),visibility:Math.round(vs),conditions:Math.round(co),raw:{cloudCover:cc,visibilityKm:Math.round(vis),weatherCode:wc,isDay,avgHigh:Math.round(aH),avgMid:Math.round(aM),avgLow:Math.round(aL)}};
}

function applyGoldenBonus(score,hour,sunrise,sunset){
  if(!sunrise||!sunset)return score;
  const srH=new Date(sunrise).getHours()+new Date(sunrise).getMinutes()/60;
  const ssH=new Date(sunset).getHours()+new Date(sunset).getMinutes()/60;
  const distSR=Math.abs(hour-srH),distSS=Math.abs(hour-ssH);
  const minDist=Math.min(distSR,distSS);
  if(minDist<=1)return Math.min(100,score+10);
  if(minDist<=1.5)return Math.min(100,score+6);
  if(minDist<=2)return Math.min(100,score+3);
  return score;
}

function avg(a){if(!a||!a.length)return 0;return a.reduce((s,v)=>s+(v||0),0)/a.length}

/* ========== Rendering ========== */
function getVerdict(s){
  if(s>=85)return{label:t('stunning'),desc:t('stunningDesc'),color:'var(--score-excellent)'};
  if(s>=70)return{label:t('beautiful'),desc:t('beautifulDesc'),color:'var(--score-good)'};
  if(s>=50)return{label:t('decent'),desc:t('decentDesc'),color:'var(--score-fair)'};
  if(s>=30)return{label:t('meh'),desc:t('mehDesc'),color:'var(--score-poor)'};
  return{label:t('gloomy'),desc:t('gloomyDesc'),color:'var(--score-bad)'};
}
function wLabel(c){return(i18n[lang].weather[c])||`Code ${c}`}
function fmtDate(d){const M=i18n[lang].months;let h=d.getHours(),ap=h>=12?'PM':'AM';h=h%12||12;return`${M[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${t('at')} ${h}:${pad(d.getMinutes())} ${ap}`}
function fmtTime(iso){if(!iso)return'--:--';const d=new Date(iso);let h=d.getHours(),ap=h>=12?'PM':'AM';h=h%12||12;return`${h}:${pad(d.getMinutes())} ${ap}`}
function vColor(v){return v>=80?'var(--score-excellent)':v>=60?'var(--score-good)':v>=40?'var(--score-fair)':v>=20?'var(--score-poor)':'var(--score-bad)'}

function renderResult(data,name,lat,lon,targetDate,mode,useCurrent){
  let scores;
  const h=data.hourly;
  const sunrise=data.daily?.sunrise?.[0]||null;
  const sunset=data.daily?.sunset?.[0]||null;

  if(useCurrent&&data.current){scores=computeFromCurrent(data);}
  else{
    if(!h||!h.time||!h.time.length)return showError(t('noData'));
    const tH=targetDate.getHours();let bI=0,bD=Infinity;
    for(let i=0;i<h.time.length;i++){const diff=Math.abs(new Date(h.time[i]).getHours()-tH);if(diff<bD){bD=diff;bI=i;}}
    scores=computeFromHourly(h,bI);
  }

  // Apply golden hour bonus
  const targetHour=targetDate.getHours()+targetDate.getMinutes()/60;
  scores.total=applyGoldenBonus(scores.total,targetHour,sunrise,sunset);
  scores.isGolden=false;
  if(sunrise&&sunset){const srH=new Date(sunrise).getHours()+new Date(sunrise).getMinutes()/60;const ssH=new Date(sunset).getHours()+new Date(sunset).getMinutes()/60;if(Math.min(Math.abs(targetHour-srH),Math.abs(targetHour-ssH))<=1.5)scores.isGolden=true;}

  lastResult={scores,name,lat,lon,targetDate,mode};
  addRecent(name,lat,lon);

  const v=getVerdict(scores.total);
  const circ=2*Math.PI*46,off=circ-(scores.total/100)*circ;
  const modeLabel=mode==='past'?t('historical'):mode==='future'?t('forecast'):t('live');
  setBackground(scores.total,scores.raw.isDay);
  playTone(scores.total);

  // Best hour today
  let bestHourHTML='';
  if(h&&h.time&&h.time.length>=12){
    let bestS=0,bestI=0;
    for(let i=0;i<Math.min(h.time.length,24);i++){
      const sc=computeFromHourly(h,i);
      const hr=new Date(h.time[i]).getHours()+new Date(h.time[i]).getMinutes()/60;
      const adj=applyGoldenBonus(sc.total,hr,sunrise,sunset);
      if(adj>bestS){bestS=adj;bestI=i;}
    }
    const bestTime=new Date(h.time[bestI]);
    bestHourHTML=`<div class="best-hour"><div class="best-hour-title">${t('bestHour')}</div><div class="best-hour-value">${fmtTime(h.time[bestI])}</div><div class="best-hour-score">${t('bestHourScore')}: ${bestS}</div></div>`;
  }

  // 7-day strip
  let stripHTML='';
  if(data.daily&&data.daily.time&&data.daily.time.length>1){
    const dayNames=i18n[lang].days;
    let strips='';
    for(let d=0;d<data.daily.time.length&&d<7;d++){
      const dayDate=new Date(data.daily.time[d]+'T12:00');
      const dayIdx=dayDate.getDay();
      // Find hourly index for noon on this day
      let noonIdx=0;
      if(h&&h.time){for(let i=0;i<h.time.length;i++){if(h.time[i].startsWith(data.daily.time[d])&&new Date(h.time[i]).getHours()>=11){noonIdx=i;break;}}}
      const sc=h?computeFromHourly(h,noonIdx):{total:0};
      const adj=applyGoldenBonus(sc.total,12,data.daily.sunrise?.[d],data.daily.sunset?.[d]);
      strips+=`<div class="strip-day ${d===0?'active':''}" data-date="${data.daily.time[d]}"><div class="strip-day-name">${dayNames[dayIdx]}</div><div class="strip-day-score" style="color:${vColor(adj)}">${adj}</div><div class="strip-day-label">${data.daily.time[d].slice(5)}</div></div>`;
    }
    stripHTML=`<div class="forecast-strip"><div class="forecast-strip-title">${t('next7days')}</div><div class="strip-row">${strips}</div></div>`;
  }

  $('output').innerHTML=`
    <div class="result-card">
      <div class="location-name">${name} <span class="time-badge ${mode}">${modeLabel}</span></div>
      <div class="location-meta">
        ${lat.toFixed(2)}°, ${lon.toFixed(2)}° · ${wLabel(scores.raw.weatherCode)} · ${scores.raw.isDay?t('daytime'):t('nighttime')}<br>
        ${fmtDate(targetDate)}
        ${scores.isGolden?`<br><span class="golden-badge">✦ ${t('goldenHour')}</span>`:''}
      </div>
      <div class="score-section">
        <div class="score-ring">
          <svg viewBox="0 0 110 110"><circle class="bg-ring" cx="55" cy="55" r="46"/><circle class="fg-ring" cx="55" cy="55" r="46" stroke="${v.color}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg>
          <div class="score-number" style="color:${v.color}">${scores.total}</div>
        </div>
        <div class="score-info"><h3 style="color:${v.color}">${v.label}</h3><p>${v.desc}</p></div>
      </div>
      <div class="metrics">
        ${metric(t('clearSky'),scores.clearSky)}${metric(t('prettyClouds'),scores.prettyClouds)}
        ${metric(t('visibility'),scores.visibility)}${metric(t('conditions'),scores.conditions)}
      </div>
      ${sunrise?`<div class="sun-info">
        <div class="sun-item"><div class="sun-icon">🌅</div><div class="sun-label">${t('sunrise')}</div><div class="sun-time">${fmtTime(sunrise)}</div></div>
        <div class="sun-item"><div class="sun-icon">🌇</div><div class="sun-label">${t('sunset')}</div><div class="sun-time">${fmtTime(sunset)}</div></div>
      </div>`:''}
      ${bestHourHTML}
      ${stripHTML}
      <div class="share-bar">
        <button class="share-btn" id="copyBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>${t('copyLink')}</button>
      </div>
    </div>
    <div class="methodology">
      <button class="methodology-toggle" onclick="toggleMethodology(this)">${t('howScored')}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="methodology-content" id="methodContent">
        ${t('methodIntro')}<br><br>${t('methodClear')}<br><br>${t('methodClouds')}<br><br>${t('methodVis')}<br><br>${t('methodCond')}<br><br>${t('methodGolden')}<br><br>
        <div class="formula">Score = (ClearSky × 0.40) + (PrettyClouds × 0.25) + (Visibility × 0.20) + (Conditions × 0.15) + GoldenHourBonus</div>
        <strong>${t('dataSources')}</strong><br>• ${t('methodSrcLive')}<br>• ${t('methodSrcRecent')}<br>• ${t('methodSrcOld')}<br><br>${t('methodNoKey')}
      </div>
    </div>
  `;

  // Wire buttons
  const copyBtn=$('copyBtn');
  if(copyBtn)copyBtn.addEventListener('click',()=>{
    navigator.clipboard.writeText(location.href);copyBtn.textContent=t('copied');setTimeout(()=>copyBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>${t('copyLink')}`,2000);
  });

  // Wire 7-day strip clicks
  document.querySelectorAll('.strip-day').forEach(day=>{
    day.addEventListener('click',async ()=>{
      const dateStr=day.dataset.date;
      $('dateInput').value=dateStr;
      $('timeInput').value='12:00';
      document.querySelectorAll('.strip-day').forEach(d=>d.classList.remove('active'));
      day.classList.add('active');
      const scrollY=window.scrollY;
      await fetchWeather(lat,lon,name);
      requestAnimationFrame(()=>window.scrollTo(0,scrollY));
    });
  });
}

function metric(label,val){const c=vColor(val);return`<div class="metric"><div class="metric-label">${label}</div><div class="metric-value">${val}<span style="font-size:.8rem;color:var(--text-muted);font-weight:300">/100</span></div><div class="metric-bar"><div class="metric-bar-fill" style="width:${val}%;background:${c}"></div></div></div>`}

function toggleMethodology(btn){btn.classList.toggle('open');$('methodContent').classList.toggle('open');}
function showStatus(msg){resetBackground();$('output').innerHTML=`<div class="status"><span class="spinner"></span>${msg}</div>`}
function showError(msg){resetBackground();$('output').innerHTML=`<div class="error">${msg}</div>`}

function setBackground(score,isDay){
  const b=document.body,r=document.documentElement;
  let bg,tc,mc,cb,bb,btb,btt,mb;
  if(!isDay){
    bg=score>=85?'linear-gradient(160deg,#0B1026,#1B2551 40%,#2A3A7A)':score>=70?'linear-gradient(160deg,#0F1535,#1E2D5E 40%,#2C3E6E)':score>=50?'linear-gradient(160deg,#151820,#252A38 40%,#353B4A)':score>=30?'linear-gradient(160deg,#1A1A22,#252530 40%,#30303D)':'linear-gradient(160deg,#141417,#1E1E24 40%,#28282F)';
    tc='#E8E8F0';mc='#9999B0';cb='rgba(255,255,255,0.07)';bb='rgba(255,255,255,0.1)';btb='#E8E8F0';btt='#1A1A2E';mb='rgba(255,255,255,0.05)';
  }else{
    bg=score>=85?'linear-gradient(160deg,#87CEEB,#B0E0F6 30%,#E8F4FD 70%,#F0F7FB)':score>=70?'linear-gradient(160deg,#9ECFDF,#C4DFE8 30%,#E5EFF3 70%,#F2F6F8)':score>=50?'linear-gradient(160deg,#B8C6CE,#CDD6DA 30%,#E2E6E8 70%,#EEEFF0)':score>=30?'linear-gradient(160deg,#A0A0A8,#BCBCC2 30%,#D5D5D8 70%,#E5E5E7)':'linear-gradient(160deg,#7A7A82,#9A9AA0 30%,#B8B8BC 70%,#D0D0D2)';
    if(score<30){tc='#F0F0F0';mc='#C8C8D0';cb='rgba(255,255,255,0.12)';bb='rgba(255,255,255,0.15)';btb='#F0F0F0';btt='#2A2A2A';mb='rgba(255,255,255,0.08)';}
    else{tc='#1A1A1A';mc='#7A7A7A';cb='rgba(255,255,255,0.85)';bb='#E8E5E0';btb='#1A1A1A';btt='#F6F4F0';mb='rgba(0,0,0,0.04)';}
  }
  b.style.background=bg;r.style.setProperty('--text',tc);r.style.setProperty('--text-muted',mc);r.style.setProperty('--card',cb);r.style.setProperty('--border',bb);r.style.setProperty('--btn-bg',btb);r.style.setProperty('--btn-text',btt);r.style.setProperty('--metric-bg',mb);
}

function resetBackground(){const r=document.documentElement;document.body.style.background='';r.style.setProperty('--text','#1A1A1A');r.style.setProperty('--text-muted','#7A7A7A');r.style.setProperty('--card','#FFFFFF');r.style.setProperty('--border','#E8E5E0');r.style.setProperty('--btn-bg','#1A1A1A');r.style.setProperty('--btn-text','#F6F4F0');r.style.setProperty('--metric-bg','#F0EDE8');}
</script>
